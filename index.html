<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Производствен Монитор</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 8px; margin: 10px; border-left: 4px solid #60a5fa; }
    </style>
</head>
<body>
    <h1>Активни задачи</h1>
    <div id="dashboard-grid"></div>

    <script>
        const client = supabase.createClient('https://zdythzcgcjxwbxufunuh.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkeXRoemNnY2p4d2J4dWZ1bnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTcxNTMsImV4cCI6MjA5NjE5MzE1M30.XGZX5DHhJCGz9X5s__3iuSghukjanyJmGKv8MLig_jE');

        async function init() {
            const grid = document.getElementById('dashboard-grid');
            const { data: plan } = await client.from('plan').select('*');
            const { data: routes } = await client.from('marshruti').select('*');

            grid.innerHTML = ''; 

            plan.forEach(p => {
                let dId = String(p['ID Детайл']).trim();
                // Търсим съвпадение, като игнорираме малки/големи букви и излишни интервали
                let myRoute = routes.filter(r => String(r['Код на детайла']).trim().toLowerCase() === dId.toLowerCase());
                
                if (myRoute.length === 0) {
                    grid.innerHTML += `<div class="card">Детайл <b>${dId}</b> от плана НЕ е намерен в маршрутите!</div>`;
                } else {
                    grid.innerHTML += `<div class="card">Детайл <b>${dId}</b> е намерен! Операции: ${myRoute.length}</div>`;
                }
            });
        }
        init();
    </script>
</body>
</html>
