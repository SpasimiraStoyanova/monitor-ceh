<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Производствен Монитор - Активен</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; color: #60a5fa; }
        #dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        
        .card { background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .detail-name { font-size: 24px; font-weight: bold; color: #60a5fa; margin-bottom: 15px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        
        /* Стилизиране на операцията */
        .active-op { background: #1e3a8a; border-left: 6px solid #60a5fa; padding: 20px; border-radius: 8px; }
        .active-op span { color: #fff; font-size: 22px; }
        .qty-box { font-size: 28px; font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <h1>Активни задачи</h1>
    <div id="dashboard-grid">Зареждане на задачите...</div>

    <script>
        const client = supabase.createClient('URL', 'KEY'); // Сложи твоите ключове тук

        async function init() {
            // 1. Взимаме всички данни
            const [ {data: plan}, {data: bom}, {data: stock}, {data: routes}, {data: reports} ] = await Promise.all([
                client.from('plan').select('*'),
                client.from('bom').select('*'),
                client.from('stock').select('*'),
                client.from('marshruti').select('*'),
                client.from('otcheti').select('*')
            ]);

            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';

            // 2. Логика: За всеки детайл в плана
            plan.forEach(p => {
                let dId = p['ID Детайл'];
                let neededTotal = p['Количество']; // Колко резолвера трябват
                
                // Взимаме поддетайлите от BOM
                let subParts = bom.filter(b => b.parent_id === dId);

                subParts.forEach(sub => {
                    let subId = sub.child_id;
                    let target = (sub.qty_per_unit * neededTotal) - (stock.find(s => s.id === subId)?.qty || 0);

                    // Намираме маршрута за този поддетайл
                    let route = routes.filter(r => r['Код на детайла'] === subId);
                    
                    // Намираме ПЪРВАТА недовършена операция
                    let activeOp = null;
                    for (let step of route) {
                        let produced = reports.filter(r => r['ID Детайл'] === subId && r['Операция'] === step['Име на операция'])
                                              .reduce((sum, r) => sum + r['Количество'], 0);
                        
                        if (produced < target) {
                            activeOp = { name: step['Име на операция'], current: produced, target: target };
                            break; // Намерихме я - спираме търсенето (скриваме следващите)
                        }
                    }

                    // Рендерираме само ако има активна операция
                    if (activeOp) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="detail-name">${subId} (за ${dId})</div>
                            <div class="active-op">
                                <span>Операция: <b>${activeOp.name}</b></span>
                                <div class="qty-box">${activeOp.current} / ${activeOp.target}</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            });
        }
        init();
    </script>
</body>
</html>
