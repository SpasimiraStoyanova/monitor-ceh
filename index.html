<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Производствен Монитор - Графика</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
        h1 { border-bottom: 2px solid #334155; padding-bottom: 10px; }
        #graph-container { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 8px; 
            margin-top: 20px; 
            overflow-x: auto; /* Позволява скролиране, ако графиката стане много голяма */
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Активни производствени потоци</h1>
    <div id="graph-container">Зареждане на графиката...</div>

    <script>
        // Инициализация на чертожника (с тъмна тема, за да си ходи с дизайна)
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });

        const client = supabase.createClient(
            'https://zdythzcgcjxwbxufunuh.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkeXRoemNnY2p4d2J4dWZ1bnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTcxNTMsImV4cCI6MjA5NjE5MzE1M30.XGZX5DHhJCGz9X5s__3iuSghukjanyJmGKv8MLig_jE'
        );

        async function init() {
            const container = document.getElementById('graph-container');
            
            const { data: materials, error } = await client.from('общ_план_материали').select('*');

            if (error || !materials || materials.length === 0) {
                container.innerHTML = '<p style="color: #ef4444;">Грешка или липсващ план.</p>';
                return;
            }

            // Започваме да пишем "кода" за графиката. RL означава Right-to-Left (от дясно на ляво)
            let graphDefinition = 'graph RL\n';

            // Дефинираме цветовете
            graphDefinition += 'classDef done fill:#16a34a,color:#fff,stroke:#fff;\n';    // Зелено
            graphDefinition += 'classDef active fill:#2563eb,color:#fff,stroke:#fff;\n';  // Синьо
            graphDefinition += 'classDef pending fill:#475569,color:#fff,stroke:#fff;\n'; // Сиво (чакащи)

            materials.forEach(item => {
                // Създаваме уникални ID-та за кутийките (премахваме интервали и символи)
                let parentId = 'node_' + item.текущ_родител.replace(/[^a-zA-Z0-9]/g, '');
                let childId = 'node_' + item.детайл_код.replace(/[^a-zA-Z0-9]/g, '');

                // Рисуваме кутийките с имената на детайлите и нужните бройки
                graphDefinition += `  ${parentId}["${item.текущ_родител}"]\n`;
                graphDefinition += `  ${childId}["${item.детайл_код} (${item.общо_необходимо_количество} бр.)"]\n`;

                // Рисуваме стрелката между тях. За момента текстът е тестов.
                graphDefinition += `  ${childId} -->|"Чака операция"| ${parentId}\n`;
                
                // За момента правим всичко сиво (pending). По-късно ще добавим логиката за зелено и синьо.
                graphDefinition += `  class ${parentId} pending;\n`;
                graphDefinition += `  class ${childId} pending;\n`;
            });

            // Караме библиотеката да нарисува графиката на екрана
            try {
                const { svg } = await mermaid.render('productionGraph', graphDefinition);
                container.innerHTML = svg;
            } catch (err) {
                console.error("Грешка при чертане:", err);
            }
        }
        
        init();
    </script>
</body>
</html>
